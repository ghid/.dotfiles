console_title_template = '{{ .Folder }}'
version = 4
final_space = true

[palette]
  green = '#a6d189'
  red = '#e78284'
  surface0 = '#414559'
  surface1 = '#51576d'
  surface2 = '#626880'
  teal = '#81c8be'
  yellow = '#e5c890'

[secondary_prompt]
  template = '❯❯ '
  foreground = 'p:green'
  background = 'transparent'

[transient_prompt]
  template = '{{ if gt .Code 0 }}({{ .Code }}){{ end }}❯ '
  background = 'transparent'
  foreground_templates = ['{{ if gt .Code 0 }}p:red{{ end }}', '{{ if eq .Code 0 }}p:green{{ end }}']

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = '{{ .Icon }}  '
    foreground = 'p:teal'
    background = 'transparent'
    type = 'os'
    style = 'plain'

  [[blocks.segments]]
    template = '{{ .Path }}'
    foreground = 'blue'
    background = 'transparent'
    type = 'path'
    style = 'plain'

    [blocks.segments.options]
      style = 'agnoster_short'
      home_icon = '~'
      folder_icon = '..'

  [[blocks.segments]]
    template = " {{ .UpstreamIcon }} {{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }}"
    foreground = 'p:surface2'
    background = 'transparent'
    type = 'git'
    style = 'plain'
    
    [blocks.segments.options]
    fetch_status = true
    fetch_upstream_icon = true
    source = "cli"

    [blocks.segments.options.mapped_branches]
    "bug/*" = "🪲 "
    "feat/*" = "🚀 "

  [[blocks.segments]]
    # template = " 󱃾 {{.Cluster}}{{if .Namespace}} :: {{.Namespace}}{{end}} "
    template = '{{ .Env.POSH_OPENSHIFT_PROMPT }}'
    background = 'transparent'
    foreground = '#99d1db'
    type = 'kubectl'
    style = 'plain'

[[blocks]]
  type = 'prompt'
  alignment = 'right'

  [[blocks.segments]]
    template = '{{ .Env.POSH_WATSON_PROMPT }}'
    foreground = '#31b198'
    type = 'text'
    style = 'plain'

  [[blocks.segments]]
    template = '  {{ .Full }}'
    foreground = '#c24f1e'
    type = 'ocaml'
    style = 'plain'

  [[blocks.segments]]
    template = '  {{ .Full }}'
    foreground = '#7fd5ea'
    type = 'go'
    style = 'plain'

[[blocks]]
  type = 'rprompt'
  overflow = 'hidden'

  [[blocks.segments]]
    template = '{{ .FormattedMs }}'
    foreground = 'p:yellow'
    background = 'transparent'
    type = 'executiontime'
    style = 'plain'

  [[blocks.segments]]
    foreground = 'p:surface2'
    type = 'time'
    style = 'plain'

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = '{{ if gt .Code 0}}({{ .Code }}){{ end }}❯'
    background = 'transparent'
    type = 'text'
    style = 'plain'
    foreground_templates = ['{{ if gt .Code 0 }}p:red{{ end }}', '{{ if eq .Code 0 }}p:green{{ end }}']
