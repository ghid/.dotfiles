#:schema https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

version = 2
final_space = true
console_title_template = '{{ .Folder }}'

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true

    [[blocks.segments]]
    type = 'os'
    style = 'plain'
    background = 'transparent'
    foreground = '#26c6da'
    template = '{{ .Icon }}  '

    [[blocks.segments]]
    type = 'path'
    style = 'plain'
    background = 'transparent'
    foreground = 'blue'
    template = "{{ .Path }}"

        [blocks.segments.properties]
        style = 'full'

    [[blocks.segments]]
    type = 'git'
    style = 'plain'
    foreground = 'p:grey'
    background = 'transparent'
    template = ' {{ .HEAD }}{{ if or (.Working.Changed) (.Staging.Changed) }}*{{ end }} <cyan>{{ if gt .Behind 0 }}⇣{{ end }}{{ if gt .Ahead 0}}⇡{{ end }}</>'

        [blocks.segments.properties]
        fetch_status = true
        commit_icon = ''

[[blocks]]
type = 'prompt'
alignment = 'right'

    [[blocks.segments]]
    type = 'command'
    style = 'plain'
    foreground = '#31b198'

        [blocks.segments.properties]
        shell = 'sh'
        command = 'watson-prompt.sh'

    [[blocks.segments]]
    type = "ocaml"
    style = "plain"
    foreground = "#c24f1e"
    template = "  {{ .Full }}"

    [[blocks.segments]]
    type = "go"
    style = "plain"
    foreground = "#7FD5EA"
    template = "  {{ .Full }}"

[[blocks]]
type = 'rprompt'
overflow = 'hidden'
    [[blocks.segments]]
    type = 'executiontime'
    style = 'plain'
    foreground = 'yellow'
    background = 'transparent'
    template = '{{ .FormattedMs }}'

        [blocks.segments.properties]
        threshold = 5000
        style = 'austin'

    [[blocks.segments]]
    type = 'time'
    style = 'plain'
    foreground = '#f5e0dc'
    
    [properties]
    time_format = '15:04:05'

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true

    [[blocks.segments]]
    type = 'text'
    style = 'plain'
    background = 'transparent'
    foreground_templates = [
        "{{ if gt .Code 0 }}red{{ end }}",
        "{{ if eq .Code 0 }}p:green{{ end }}",
    ]
    template = '❯'

        [transient_prompt]
        background = 'transparent'
        foreground_templates = [
            "{{ if gt .Code 0 }}red{{ end }}",
            "{{ if eq .Code 0 }}p:green{{ end }}",
        ]
        template = '❯ '

        [secondary_prompt]
        foreground = 'p:green'
        background = 'transparent'
        template = '❯❯ '

[palette]
grey = '#6c6c6c'
green = '#5ec43c'
